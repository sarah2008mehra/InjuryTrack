<!DOCTYPE html>
<html>
<head>
  <title>Injury Tracker Pro</title>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      font-family: Arial;
      text-align: center;
      padding: 30px;
      background: #f9f9f9;
    }

    h1 { color: #b30000; }

    input, select {
      padding: 10px;
      margin: 10px;
      width: 250px;
    }

    button {
      padding: 10px 20px;
      margin: 10px;
      background: #b30000;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }

    button:hover {
      background: #800000;
    }

    .box {
      margin-top: 20px;
      text-align: left;
      max-width: 500px;
      margin: auto;
      background: white;
      padding: 20px;
      border-radius: 10px;
    }

    canvas {
      margin-top: 30px;
      max-width: 600px;
    }
  </style>
</head>

<body>

<h1>Injury Tracker</h1>
<p><b>A platform by Sarah Mehra</b></p>

<h3 id="welcome"></h3>

<input id="name" placeholder="Your Name"><br>
<input id="sport" placeholder="Your Sport"><br>

<select id="injury">
  <option value="">Select Injury</option>
  <option value="ankle">Ankle</option>
  <option value="knee">Knee</option>
  <option value="shoulder">Shoulder</option>
</select><br>

<input id="pain" placeholder="Pain level (1-10)"><br>

<button onclick="generatePlan()">Save & Analyze</button>
<button onclick="clearData()">Clear All</button>
<button onclick="goHome()">Back Home</button>

<div id="output" class="box"></div>
<div id="analysis" class="box"></div>
<div id="history" class="box"></div>

<canvas id="painChart"></canvas>

<script>
let chart;
let storedData = JSON.parse(localStorage.getItem("injuryData")) || [];

function generatePlan() {
  let name = document.getElementById("name").value;
  let sport = document.getElementById("sport").value;
  let injury = document.getElementById("injury").value;
  let pain = parseInt(document.getElementById("pain").value);

  if (!injury || !pain) {
    document.getElementById("output").innerHTML = "Please fill all fields.";
    return;
  }

  document.getElementById("welcome").innerText =
    "Welcome " + (name || "Athlete") + " 👋";

  let date = new Date().toLocaleDateString();

  storedData.push({ date, pain });
  localStorage.setItem("injuryData", JSON.stringify(storedData));

  updateChart();
  showHistory();
  showAnalysis();

  let prevention="", diet="", rest="", recovery="", warning="";

  if(injury==="ankle"){
    prevention="Avoid running.";
    recovery="Use RICE method.";
  }
  if(injury==="knee"){
    prevention="Avoid squats.";
    recovery="Strengthen muscles.";
  }
  if(injury==="shoulder"){
    prevention="Avoid overhead lifts.";
    recovery="Mobility exercises.";
  }

  if(pain>=7){
    rest="Complete rest required.";
    diet="High protein + anti-inflammatory.";
    warning="⚠️ High pain detected – consider professional advice.";
  } else if(pain>=4){
    rest="Limit movement.";
    diet="Balanced diet.";
  } else {
    rest="Light activity allowed.";
    diet="Maintain healthy diet.";
  }

  document.getElementById("output").innerHTML = `
    <h3>Recovery Plan</h3>
    <b>Prevention:</b> ${prevention}<br><br>
    <b>Diet:</b> ${diet}<br><br>
    <b>Rest:</b> ${rest}<br><br>
    <b>Recovery:</b> ${recovery}<br><br>
    <b style="color:red;">${warning}</b>
  `;
}

function updateChart() {
  let ctx = document.getElementById("painChart").getContext("2d");

  let labels = storedData.map(d => d.date);
  let data = storedData.map(d => d.pain);

  if(chart) chart.destroy();

  chart = new Chart(ctx, {
    type: "line",
    data: {
      labels: labels,
      datasets: [{
        label: "Pain Level",
        data: data,
        borderWidth: 2
      }]
    },
    options: {
      scales: {
        y: {
          min: 0,
          max: 10,
          title: {
            display: true,
            text: "Pain Level"
          }
        }
      }
    }
  });
}

function showHistory() {
  let html = "<h3>History</h3>";

  storedData.forEach(d => {
    html += `${d.date} - Pain: ${d.pain}<br>`;
  });

  document.getElementById("history").innerHTML = html;
}

function showAnalysis() {
  if(storedData.length < 2) return;

  let last = storedData[storedData.length - 1].pain;
  let prev = storedData[storedData.length - 2].pain;

  let message = "";
  let trend = "";
  let score = 100 - last * 10;

  if(last < prev) {
    message = "✅ You are recovering well.";
    trend = "Trend: Improving 📉";
  }
  else if(last > prev) {
    message = "🚨 Pain increasing. Be careful.";
    trend = "Trend: Worsening 📈";
  }
  else {
    message = "⚠️ Recovery is slow.";
    trend = "Trend: Stable";
  }

  document.getElementById("analysis").innerHTML = `
    <h3>Recovery Analysis</h3>
    ${message}<br><br>
    ${trend}<br><br>
    Recovery Score: ${score}%
  `;
}

function clearData() {
  localStorage.removeItem("injuryData");
  storedData = [];

  document.getElementById("output").innerHTML = "";
  document.getElementById("analysis").innerHTML = "";
  document.getElementById("history").innerHTML = "";

  if(chart) chart.destroy();
}

function goHome() {
  window.location.href = "index.html";
}

updateChart();
showHistory();
showAnalysis();
</script>

</body>
</html>
// LOAD ON START
updateChart();
showHistory();
showAnalysis();
</script>

</body>
</html>
