<!DOCTYPE html>
<html>
<head>
  <title>Injury Tracker</title>
  <style>
    body {
      font-family: Arial;
      text-align: center;
      padding: 40px;
      background: #f9f9f9;
    }

    h1 {
      color: #b30000;
    }

    input, select {
      padding: 10px;
      margin: 10px;
      width: 250px;
      border-radius: 6px;
      border: 1px solid #ccc;
    }

    button {
      padding: 12px 25px;
      background: #b30000;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }

    .result {
      margin-top: 30px;
      padding: 20px;
      background: white;
      border-radius: 10px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      text-align: left;
      max-width: 500px;
      margin-left: auto;
      margin-right: auto;
    }
  </style>
</head>

<body>

<h1>Injury Tracker</h1>

<select id="injury">
  <option value="">Select Injury Type</option>
  <option value="ankle">Ankle Injury</option>
  <option value="knee">Knee Injury</option>
  <option value="shoulder">Shoulder Injury</option>
</select><br>

<input id="pain" placeholder="Pain Level (1-10)"><br>

<button onclick="generatePlan()">Get Recovery Plan</button>

<div id="output" class="result"></div>

<script>
function generatePlan() {
  let injury = document.getElementById("injury").value;
  let pain = document.getElementById("pain").value;

  if (!injury || !pain) {
    document.getElementById("output").innerHTML = "Please fill all fields.";
    return;
  }

  let prevention = "";
  let diet = "";
  let rest = "";
  let recovery = "";

  // INJURY-BASED LOGIC
  if (injury === "ankle") {
    prevention = "Avoid running and jumping. Use ankle support.";
    recovery = "Follow RICE method (Rest, Ice, Compression, Elevation).";
  }

  if (injury === "knee") {
    prevention = "Avoid deep squats and sudden movements.";
    recovery = "Focus on strengthening surrounding muscles gradually.";
  }

  if (injury === "shoulder") {
    prevention = "Avoid overhead lifting.";
    recovery = "Do light mobility and resistance rehab.";
  }

  // PAIN-BASED LOGIC
  if (pain >= 7) {
    rest = "High pain: Complete rest is required.";
    diet = "High protein + anti-inflammatory foods (turmeric, omega-3).";
  } else if (pain >= 4) {
    rest = "Moderate pain: Limited movement, avoid strain.";
    diet = "Balanced diet with protein and vitamins.";
  } else {
    rest = "Low pain: Light activity allowed.";
    diet = "Maintain healthy diet.";
  }

  document.getElementById("output").innerHTML = `
    <h2>Your Recovery Plan</h2>
    <b>Prevention:</b> ${prevention}<br><br>
    <b>Diet:</b> ${diet}<br><br>
    <b>Rest:</b> ${rest}<br><br>
    <b>Recovery:</b> ${recovery}
  `;
}
</script>

</body>
</html>
