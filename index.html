<!DOCTYPE html>
<html>
<head>
  <title>Injury Tracker</title>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      font-family: Arial;
      text-align: center;
      padding: 30px;
      background: #f9f9f9;
    }

    h1 {
      color: #b30000;
    }

    input, select {
      padding: 10px;
      margin: 10px;
      width: 250px;
    }

    button {
      padding: 10px 20px;
      margin: 10px;
      background: #b30000;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }

    .result {
      margin-top: 20px;
      text-align: left;
      max-width: 500px;
      margin: auto;
      background: white;
      padding: 20px;
      border-radius: 10px;
    }
  </style>
</head>

<body>

<h1>Injury Tracker</h1>
<p><b>A platform by Sarah Mehra</b></p>

<select id="injury">
  <option value="">Select Injury</option>
  <option value="ankle">Ankle</option>
  <option value="knee">Knee</option>
  <option value="shoulder">Shoulder</option>
</select><br>

<input id="pain" placeholder="Pain level (1-10)"><br>

<button onclick="generatePlan()">Get Plan</button>
<button onclick="clearData()">Clear</button>
<button onclick="goHome()">Back Home</button>

<div id="output" class="result"></div>

<canvas id="painChart"></canvas>

<script>
let painData = [];
let labels = [];
let chart;

function generatePlan() {
  let injury = document.getElementById("injury").value;
  let pain = document.getElementById("pain").value;

  if (!injury || !pain) {
    document.getElementById("output").innerHTML = "Please fill all fields.";
    return;
  }

  pain = parseInt(pain);

  painData.push(pain);
  labels.push("Entry " + painData.length);

  updateChart();

  let prevention="", diet="", rest="", recovery="";

  if(injury==="ankle"){
    prevention="Avoid running.";
    recovery="Use RICE method.";
  }
  if(injury==="knee"){
    prevention="Avoid squats.";
    recovery="Strengthen muscles.";
  }
  if(injury==="shoulder"){
    prevention="Avoid overhead lifts.";
    recovery="Mobility exercises.";
  }

  if(pain>=7){
    rest="Complete rest.";
    diet="High protein + anti-inflammatory.";
  } else if(pain>=4){
    rest="Limited movement.";
    diet="Balanced diet.";
  } else {
    rest="Light activity.";
    diet="Maintain diet.";
  }

  document.getElementById("output").innerHTML = `
    <h3>Your Recovery Plan</h3>
    <b>Prevention:</b> ${prevention}<br><br>
    <b>Diet:</b> ${diet}<br><br>
    <b>Rest:</b> ${rest}<br><br>
    <b>Recovery:</b> ${recovery}
  `;
}

function updateChart() {
  let ctx = document.getElementById("painChart").getContext("2d");

  if (chart) chart.destroy();

  chart = new Chart(ctx, {
    type: 'line',
    data: {
      labels: labels,
      datasets: [{
        label: 'Pain Level Over Time',
        data: painData,
        fill: false
      }]
    }
  });
}

function clearData() {
  document.getElementById("injury").value="";
  document.getElementById("pain").value="";
  document.getElementById("output").innerHTML="";

  painData = [];
  labels = [];

  if (chart) chart.destroy();
}

function goHome() {
  window.location.href = "index.html";
}
</script>

</body>
</html>
